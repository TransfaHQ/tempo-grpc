
syntax = "proto3";

package exex;

import "google/protobuf/empty.proto";


service BlockStream {
  rpc Subscribe(SubscribeRequest) returns (stream BlockChunk) {}
  rpc Backfill(BackfillRequest) returns (stream BlockChunk) {}
  rpc BackfillToLive(BackfillToLiveRequest) returns (stream BlockChunk) {}
}

message SubscribeRequest {}

message BackfillRequest {
  uint64 from = 1;
  uint64 to = 2;
  uint64 size = 3;
}

message BackfillToLiveRequest {
  uint64 from = 1;
  uint64 size = 2;
}

message BlockChunk {
  repeated Block items = 1;
}

message Block {
  bytes hash = 1;
  bytes parent_hash = 2;
  bytes ommers_hash = 3;
  bytes miner = 4;
  bytes state_root = 5;
  bytes transactions_root = 6;
  bytes receipts_root = 7;
  bytes logs_bloom = 8;
  bytes difficulty = 9;
  uint64 number = 10;
  uint64 gas_limit = 11;
  uint64 gas_used = 12;
  uint64 timestamp = 13;
  bytes mix_hash = 14;
  bytes nonce = 15;
  optional uint64 base_fee_per_gas = 16;
  optional uint64 blob_gas_used = 17;
  optional uint64 excess_blob_gas = 18;
  optional bytes parent_beacon_block_root = 19;
  uint64 general_gas_limit = 20;
  uint64 shared_gas_limit = 21;
  uint64 timestamp_millis_part = 22;
  bytes extra_data = 23;
  optional bytes requests_hash = 24;
  uint64 size = 25;
  uint64 timestamp_millis = 26;
  optional bytes withdrawals_root = 27;
  repeated bytes uncles = 28;
  repeated TransactionEnvelope transactions = 29;
  optional Withdrawals withdrawals = 30;
  BlockStatus status = 31;
}

message TransactionEnvelope {
  bytes hash = 1;
  uint64 index = 2;
  bytes sender = 3;
  oneof signature {
    Signature eth_signature = 4;
    TempoSignature tempo_signature = 5;
  }
  oneof transaction {
    TransactionLegacy legacy = 6;
    TransactionEip2930 eip2930 = 7;
    TransactionEip1559 eip1559 = 8;
    TransactionEip7702 eip7702 = 9;
    TransactionTempo tempo = 10;
  }
  Receipt receipt = 11;
}

message Receipt {
  optional bytes contract_address = 1;
  uint64 cumulative_gas_used = 2;
  bytes effective_gas_price = 3;
  bytes fee_payer = 4;
  optional bytes fee_token = 5;
  uint64 gas_used = 6;
  repeated Log logs = 7;
  bytes logs_bloom = 8;
  bool success = 9;
  TxType tx_type = 10;
}

enum BlockStatus {
  COMMITTED = 0;
  REORGED = 1;
  REVERTED = 2;
}

message Withdrawals {
  repeated Withdrawal items = 1;
}

message Withdrawal {
  uint64 index = 1;
  uint64 validator_index = 2;
  bytes address = 3;
  uint64 amount = 4;
}

message Signature {
  bytes r = 1;
  bytes s = 2;
  uint32 y_parity = 3;
}

message TransactionLegacy {
  optional uint64 chain_id = 1;
  uint64 nonce = 2;
  bytes gas_price = 3;
  bytes gas_limit = 4;
  TxKind to = 5;
  bytes value = 6;
  bytes input = 7;
}

message TransactionEip2930 {
  uint64 chain_id = 1;
  uint64 nonce = 2;
  bytes gas_price = 3;
  bytes gas_limit = 4;
  TxKind to = 5;
  bytes value = 6;
  repeated AccessListItem access_list = 7;
  bytes input = 8;
}

message TransactionEip1559 {
  uint64 chain_id = 1;
  uint64 nonce = 2;
  bytes gas_limit = 3;
  bytes max_fee_per_gas = 4;
  bytes max_priority_fee_per_gas = 5;
  TxKind to = 6;
  bytes value = 7;
  repeated AccessListItem access_list = 8;
  bytes input = 9;
}

message TransactionEip7702 {
  uint64 chain_id = 1;
  uint64 nonce = 2;
  bytes gas_limit = 3;
  bytes max_fee_per_gas = 4;
  bytes max_priority_fee_per_gas = 5;
  bytes to = 6;
  bytes value = 7;
  repeated AccessListItem access_list = 8;
  repeated AuthorizationListItem authorization_list = 9;
  bytes input = 10;
}

message TransactionTempo {
  uint64 chain_id = 1;
  bytes max_fee_per_gas = 2;
  bytes max_priority_fee_per_gas = 3;  
  uint64 gas_limit = 4;
  repeated Call calls = 5;
  repeated AccessListItem access_list = 6;
  bytes nonce_key = 7;
  uint64 nonce = 8;
  optional bytes fee_token = 9;
  Signature fee_payer_signature = 10;
  optional uint64 valid_before = 11;
  optional uint64 valid_after = 12;
  optional KeyAuthorization key_authorization = 13;
  repeated TempoAuthorization aa_authorization_list = 14;
}

message Call {
  TxKind to = 1;
  bytes value = 2;
  bytes input = 3;
}

message KeyAuthorization {
  uint64 chain_id = 1;
  SignatureType key_type = 2;
  bytes key_id = 3;
  optional uint64 expiry = 4;
  optional TokenLimits limits = 5;
  PrimitiveSignature signature = 6;
}

enum SignatureType {
  SECP256K1 = 0;
  P256 = 1;
  WEBAUTHN = 2;
}

message TokenLimits {
  repeated TokenLimit items = 1;
}

message TokenLimit {
  bytes token = 1;
  bytes limit = 2;
}

message PrimitiveSignature {
  oneof signature {
    Signature secp256k1 = 1;
    P256SignatureWithPreHash p256 = 2;
    WebAuthnSignature webauthn = 3;
  }
}

message P256SignatureWithPreHash {
  bytes r = 1;
  bytes s = 2;
  bytes pub_key_x = 3;
  bytes pub_key_y = 4;
  bool pre_hash = 5; 
}

message WebAuthnSignature {
  bytes r = 1;
  bytes s = 2;
  bytes pub_key_x = 3;
  bytes pub_key_y = 4;
  bytes webauthn_data = 5; 
}

message TempoAuthorization {
  bytes chain_id = 1;
  bytes address = 2;
  uint64 nonce = 3;
  TempoSignature signature = 4;
}

message TempoSignature {
  oneof signature {
    PrimitiveSignature primitive = 1;
    KeychainSignature keychain = 2;
  }
}

message KeychainSignature {
  bytes user_address = 1;
  PrimitiveSignature signature = 2;
  KeychainVersion version = 3;
}

enum KeychainVersion {
  V1 = 0;
  V2 = 1;
}

message TxKind {
  oneof kind {
    google.protobuf.Empty create = 1;
    bytes call = 2;
  }
}

message AccessListItem {
  bytes address = 1;
  repeated bytes storage_keys = 2;
}

message AuthorizationListItem {
  Authorization authorization = 1;
  Signature signature = 2;
}

message Authorization {
  bytes chain_id = 1;
  bytes address = 2;
  uint64 nonce = 3;
}

enum TxType {
  LEGACY = 0;
  EIP2930 = 1;
  EIP1559 = 2;
  EIP7702 = 3;
  TEMPO = 4;
}

message Log {
  bytes address = 1;
  LogData data = 2;
}

message LogData {
  repeated bytes topics = 1;
  bytes data = 2;
}
